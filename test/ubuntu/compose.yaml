services:
  dotfiles2:
    build: .
    environment:
      USER: ubuntu
    volumes:
      - type: bind
        source: $PWD/../..
        target: /home/ubuntu/.local/share/chezmoi
      - type: bind
        source: $HOME/.config/sops/age/keys.txt
        target: /home/ubuntu/.config/sops/age/keys.txt
        read_only: true
    command: [ "sleep", "infinity" ]
    working_dir: /home/ubuntu/.local/share/chezmoi
