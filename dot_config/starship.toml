add_newline = false
format = "$directory$git_branch$git_state$git_status$line_break$character"
right_format = "$cmd_duration"

[git_status]
ahead = " ⇡$count"
behind = " ⇣$count"
conflicted = " [×$count](196)"
deleted = " ✘$count"
diverged = " ⇕⇡$ahead_count⇣$behind_count"
format = "[$all_status$ahead_behind]($style)"
modified = " [~$count](178)"
renamed = " »$count"
staged = " [+$count](178)"
stashed = " ≡$count"
style = "cyan"
untracked = " [?$count](39)"
up_to_date = ""
