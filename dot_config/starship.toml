"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = "$os$directory$git_branch$git_state$git_status$line_break$character"
right_format = "$cmd_duration"

[os]
disabled = false
format = "[$symbol](#blue) "

[os.symbols]
Ubuntu = "󰕈"
Arch = "󰣇"
Manjaro = "󰣇"
EndeavourOS = "󰣇"
Macos = ""

[directory]
format = "[$path](cyan) "
truncation_length = 4
truncate_to_repo  = true

[git_branch]
symbol = ""
format = "[$symbol $branch](bold purple) "

[git_status]
ahead = " ⇡$count"
behind = " ⇣$count"
conflicted = " [×$count](196)"
deleted = " ✘$count"
diverged = " ⇕⇡$ahead_count⇣$behind_count"
format = "[$all_status$ahead_behind]($style)"
modified = " [~$count](178)"
renamed = " »$count"
staged = " [+$count](178)"
stashed = " ≡$count"
style = "cyan"
untracked = " [?$count](39)"
up_to_date = ""
