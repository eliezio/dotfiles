[env]
COMPOSE_REMOVE_ORPHANS = true

[tasks.mitmproxy]
description = "Launches mitmproxy with the on-disk caching addon"
run = "mitmdump -p 3128 -s test/mitmproxy/cache.py"

[tasks.mitmproxy-clean]
description = "Wipe the mitmproxy disk cache"
run = "rm -rf ${MITMPROXY_CACHE_DIR:-$HOME/.cache/mitmproxy-cache}"

[tasks.ubuntu]
description = "Launches a clean Ubuntu container"
dir = "./test/ubuntu"
run = "docker compose --file compose.yaml --file ../compose.mitm.yaml up --detach --force-recreate"

[tasks.manjaro]
description = "Launches a clean Manjaro container"
env = { DOCKER_DEFAULT_PLATFORM = "linux/amd64" }
dir = "./test/manjaro"
run = "docker compose --file compose.yaml --file ../compose.mitm.yaml up --detach --force-recreate"
